<!DOCTYPE html>
<html lang="en">
    <head>
        <title>The Feminist Project</title>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
        <link rel="shortcut icon" type="image/x-icon" href="assets/icon.ico" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            
            body {
                font-family: "DM Sans";
                background: #050505;
                color: white;
                overflow-x: hidden;
                padding-bottom: 130px;
            }

            .background {
                position: fixed;
                inset: 0;
                background-image: url('assets/background.png');
                background-size: cover;
                background-position: center;
                opacity: 0.5;
                transform: scale(1.1);
                z-index: -1;
            }

            h1 { font-family: "Special Gothic Expanded One", sans-serif;
                font-size: 40px; 
            }
            p { font-family: "DM Sans"; }

            header {
                text-align: center;
                padding: 60px 20px 60px;
            }
        </style>
    </head>

    <body>
        <div class="background"></div>
        <header>
            <h1>The Feminist Project</h1>
            <p>Feminism</p>
        </header>
    </body>
</html>
